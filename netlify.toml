[build]
  base    = "apps/web"
  # npm ci installs strictly from the committed package-lock.json, so the deploy
  # is reproducible and immune to transitive dependency drift (a "latest"/caret
  # bump in a transitive dep, e.g. @base-org/account pulling optional @x402/*
  # modules, previously broke fresh no-cache installs while local builds passed).
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  AWS_LAMBDA_JS_RUNTIME = "nodejs22.x"


# Custom functions (incl. the generate-background worker) live alongside the
# plugin-generated Next.js functions. Path is relative to `base` (apps/web).
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-nextjs"
