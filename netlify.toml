[build]
  base    = "apps/web"
  command = "npm install && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

# Custom functions (incl. the generate-background worker) live alongside the
# plugin-generated Next.js functions. Path is relative to `base` (apps/web).
[functions]
  directory = "netlify/functions"

[[plugins]]
  package = "@netlify/plugin-nextjs"
